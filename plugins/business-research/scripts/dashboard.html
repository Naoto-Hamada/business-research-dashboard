<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #F5F7FB;
      --sidebar:   #FFFFFF;
      --card:      #FFFFFF;
      --t1:        #141414;
      --t2:        #6B6B6B;
      --t3:        #AAAAAA;
      --accent:    #2D5BE3;
      --accent-bg: #EBF0FD;
      --border:    #E8E8E4;
      --green:     #16A34A;
      --green-bg:  #F0FDF4;
      --amber:     #D97706;
      --amber-bg:  #FFFBEB;
      --purple:    #7C3AED;
      --purple-bg: #F5F3FF;
      --red:       #DC2626;
      --red-bg:    #FEF2F2;
      --sidebar-w: 220px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f5f7fb; color: var(--t1); display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: #fff; border-right: 1px solid #e4e9f2; box-shadow: none; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
    .sb-top { padding: 16px 12px 12px; border-bottom: 1px solid var(--border); }
    .sb-logo { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700; color: var(--t1); letter-spacing: -0.01em; margin-bottom: 9px; }
    .sb-logo em { color: var(--accent); font-style: normal; }
    .sb-select { width: 100%; font-family: inherit; font-size: 12px; color: var(--t2); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; outline: none; cursor: pointer; }
    .sb-select:focus { border-color: var(--accent); }
    .sb-section { padding: 10px 8px 4px; }
    .sb-section-label { font-size: 10px; font-weight: 600; color: var(--t3); letter-spacing: 0.09em; text-transform: uppercase; padding: 0 6px; margin-bottom: 2px; }
    .sb-item { display: flex; align-items: center; gap: 7px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 12.5px; color: var(--t2); transition: background 0.1s, color 0.1s; user-select: none; }
    .sb-item:hover { background: var(--bg); color: var(--t1); }
    .sb-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 500; }
    .sb-item .sb-ic { width: 16px; text-align: center; font-size: 12px; flex-shrink: 0; }
    .sb-item .sb-rt { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--bg); color: var(--t3); border: 1px solid var(--border); margin-left: auto; flex-shrink: 0; }
    .sb-divider { height: 1px; background: var(--border); margin: 6px 10px; }

    /* ── Main ── */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    /* ── Summary Board ── */
    .sum-board { background: #fff; border-bottom: 1px solid #e5eaf3; box-shadow: none; padding: 24px 36px 18px; flex-shrink: 0; }
    .sum-hdr { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
    .sum-name { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.03em; }
    .sum-meta { font-size: 12px; color: var(--t2); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .sum-meta a { color: var(--accent); text-decoration: none; font-size: 12px; }
    .sum-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
    .sum-kpi { font-size: 11.5px; font-weight: 500; color: var(--green); background: var(--green-bg); border: 1px solid #bbf7d0; border-radius: 5px; padding: 2px 9px; }
    .sum-bullets { display: flex; flex-direction: column; gap: 5px; }
    .sum-bullet { display: flex; gap: 8px; font-size: 12.5px; line-height: 1.55; }
    .sum-bullet-label { font-weight: 600; color: var(--t3); flex-shrink: 0; min-width: 32px; font-size: 11.5px; }
    .sum-bullet-text { color: var(--t1); }

    /* ── Tab bar ── */
    .tab-bar { padding: 12px 36px 0; background: var(--card); border-bottom: 1px solid var(--border); display: flex; gap: 0; flex-shrink: 0; }
    .tab-btn { padding: 8px 18px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--t3); border: none; background: none; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab-btn:hover { color: var(--t2); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Content area ── */
    .content { flex: 1; overflow-y: auto; padding: 28px 36px 42px; }

    /* ── BMC Canvas ── */
    .bmc-grid { display: grid; grid-template-columns: 1fr 1fr 1.3fr 1fr 1fr; grid-template-rows: 1fr 1fr auto; gap: 7px; margin-bottom: 16px; }
    .bmc-cell { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; min-height: 100px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .bmc-cell:hover { border-color: var(--accent); }
    .bmc-cell.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .bmc-kp   { grid-column: 1; grid-row: 1 / 3; }
    .bmc-ka   { grid-column: 2; grid-row: 1; }
    .bmc-kr   { grid-column: 2; grid-row: 2; }
    .bmc-vp   { grid-column: 3; grid-row: 1 / 3; background: var(--accent-bg); border-color: #c5d4f7; }
    .bmc-vp.active { border-color: var(--accent); }
    .bmc-cr   { grid-column: 4; grid-row: 1; }
    .bmc-ch   { grid-column: 4; grid-row: 2; }
    .bmc-cs   { grid-column: 5; grid-row: 1 / 3; }
    .bmc-cost { grid-column: 1 / 3; grid-row: 3; }
    .bmc-rev  { grid-column: 3 / 6; grid-row: 3; }
    .bmc-label { font-size: 9px; font-weight: 700; color: var(--t3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .bmc-vp .bmc-label { color: var(--accent); }
    .bmc-val { font-size: 12px; color: var(--t1); line-height: 1.6; }
    .bmc-empty { color: var(--t3); font-style: italic; }
    .bmc-hint { font-size: 10px; color: var(--t3); margin-top: 6px; }

    /* ── Financials Section ── */
    .fin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
    @media (max-width: 700px) { .fin-grid { grid-template-columns: 1fr; } }
    .fin-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
    .fin-card-label { font-size: 10px; font-weight: 700; color: var(--t3); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 8px; }
    .fin-card-summary { font-size: 13.5px; font-weight: 600; line-height: 1.4; margin-bottom: 10px; }
    .fin-card-items { list-style: none; padding: 0; margin: 0; font-size: 11.5px; color: var(--t2); }
    .fin-card-items li { padding: 4px 0; border-top: 1px solid var(--border); line-height: 1.55; }
    .fin-card-items li:first-child { border-top: none; }

    /* ── BMC Detail Panel ── */
    .bmc-detail { background: var(--card); border: 1.5px solid var(--accent); border-radius: 10px; padding: 20px 24px; margin-bottom: 8px; }
    .bmc-detail-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .bmc-detail-title { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
    .bmc-detail-close { margin-left: auto; font-size: 13px; color: var(--t3); cursor: pointer; padding: 2px 6px; border-radius: 4px; }
    .bmc-detail-close:hover { background: var(--bg); color: var(--t2); }
    .bmc-sub-label { font-size: 10px; font-weight: 700; color: var(--t3); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 6px; margin-top: 14px; }
    .bmc-sub-label:first-child { margin-top: 0; }

    /* ── Analysis block ── */
    .ana-block { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; }
    .ana-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .b-blue   { background: var(--accent-bg); color: var(--accent); }
    .b-green  { background: var(--green-bg);  color: var(--green); }
    .b-amber  { background: var(--amber-bg);  color: var(--amber); }
    .b-purple { background: var(--purple-bg); color: var(--purple); }
    .b-gray   { background: var(--bg); color: var(--t2); border: 1px solid var(--border); }
    .b-ai     { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
    .b-human  { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
    .ana-text { font-size: 13px; color: var(--t1); line-height: 1.75; }

    /* ── Evidence ── */
    .ev-toggle { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--t3); cursor: pointer; margin-top: 10px; user-select: none; }
    .ev-toggle:hover { color: var(--t2); }
    .ev-list { margin-top: 7px; display: flex; flex-direction: column; gap: 6px; }
    .ev-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; }
    .ev-quote { font-size: 12px; color: var(--t1); line-height: 1.6; font-style: italic; }
    .ev-src { font-size: 11px; color: var(--t3); margin-top: 3px; }
    .ev-src a { color: var(--accent); text-decoration: none; }
    .ev-src a:hover { text-decoration: underline; }

    /* ── Quote card ── */
    .quote-card { display: flex; align-items: flex-start; gap: 9px; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 10px 13px; margin-bottom: 7px; }
    .quote-sent { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .quote-body { flex: 1; }
    .quote-text { font-size: 12.5px; color: var(--t1); line-height: 1.6; font-style: italic; }
    .quote-attr { font-size: 11px; color: var(--t3); margin-top: 4px; }
    .quote-attr a { color: var(--accent); text-decoration: none; }

    /* ── Analyst item ── */
    .analyst-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; }
    .analyst-source { font-size: 11.5px; font-weight: 600; color: var(--t2); margin-top: 4px; }
    .analyst-text { font-size: 13px; color: var(--t1); line-height: 1.7; margin-top: 6px; font-style: italic; }
    .analyst-sent { font-size: 11px; color: var(--t3); margin-top: 6px; }

    /* ── News ── */
    .news-summary-block { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 10px; padding: 16px 20px; margin-bottom: 18px; }
    .news-summary-label { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 7px; }
    .news-summary-text { font-size: 13px; color: var(--t1); line-height: 1.75; }
    .news-list-label { font-size: 11px; font-weight: 600; color: var(--t2); text-transform: uppercase; letter-spacing: 0.07em; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
    .news-item { display: flex; align-items: flex-start; gap: 11px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 7px; }
    .news-icon { width: 28px; height: 28px; border-radius: 7px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 1px; }
    .news-body { flex: 1; min-width: 0; }
    .news-title { font-size: 13px; font-weight: 500; color: var(--t1); line-height: 1.4; margin-bottom: 4px; }
    .news-title a { color: var(--t1); text-decoration: none; }
    .news-title a:hover { color: var(--accent); text-decoration: underline; }
    .news-foot { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--t3); }
    .news-type-tag { font-size: 10.5px; padding: 1px 6px; border-radius: 4px; background: var(--bg); border: 1px solid var(--border); color: var(--t3); }
    .news-snippet { font-size: 12px; color: var(--t2); margin-top: 4px; line-height: 1.5; }

    /* ── Comparison table ── */
    .compare-wrap { overflow-x: auto; border: 1px solid #dde4f0; border-radius: 14px; box-shadow: 0 12px 28px rgba(31, 54, 99, 0.08); background: #fff; }
    .compare-table { border-collapse: collapse; width: 100%; }
    .compare-table th, .compare-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); font-size: 12.5px; vertical-align: top; line-height: 1.55; }
    .compare-table th:last-child, .compare-table td:last-child { border-right: none; }
    .compare-table tr:last-child td, .compare-table tr:last-child th { border-bottom: none; }
    .compare-table .ct-dim { position: sticky; left: 0; background: var(--bg); z-index: 5; min-width: 120px; max-width: 120px; width: 120px; font-size: 11px; font-weight: 600; color: var(--t2); }
    .compare-table .ct-biz { min-width: 200px; max-width: 240px; background: var(--card); }
    .compare-table .ct-hdr-dim { background: var(--bg); font-size: 10px; font-weight: 700; color: var(--t3); letter-spacing: 0.07em; text-transform: uppercase; }
    .compare-table .ct-hdr-biz { background: var(--card); }
    .ct-biz-name { font-size: 13.5px; font-weight: 600; margin-bottom: 3px; }
    .ct-biz-name a { color: var(--t1); text-decoration: none; }
    .ct-biz-name a:hover { color: var(--accent); text-decoration: underline; }
    .ct-biz-sub { font-size: 11.5px; color: var(--t2); }
    .ct-biz-sub a { color: var(--accent); text-decoration: none; font-size: 11.5px; }
    .ct-target { border-top: 2px solid var(--accent); }
    .ct-empty { color: var(--t3); font-style: italic; }
    .ct-row-label { display: inline-flex; align-items: center; gap: 6px; }
    .compare-table tr.ct-tone-blue td { background: #f7faff; }
    .compare-table tr.ct-tone-blue .ct-dim { background: #ebf2ff; }
    .compare-table tr.ct-tone-green td { background: #f6fbf7; }
    .compare-table tr.ct-tone-green .ct-dim { background: #e9f6ec; }
    .compare-table tr.ct-tone-neutral td { background: #fafbfc; }
    .compare-table tr.ct-tone-neutral .ct-dim { background: #eef1f4; }
    .compare-table tr.ct-tone-caution td { background: #fff9f7; }
    .compare-table tr.ct-tone-caution .ct-dim { background: #ffefea; }
    .compare-intro { border: 1px solid #d8e1f0; border-radius: 12px; background: #fff; padding: 12px 14px; margin-bottom: 14px; }
    .compare-intro-head { display: flex; align-items: center; justify-content: flex-start; gap: 8px; }
    .compare-toggle { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; font-size: 12.5px; font-weight: 600; color: var(--t2); }
    .compare-toggle input { width: 14px; height: 14px; margin: 0; accent-color: var(--accent); }
    .compare-intro-body { margin-top: 10px; display: grid; gap: 10px; }
    .anti-list { margin: 0; padding-left: 18px; display: grid; gap: 6px; }
    .anti-list li { font-size: 12.5px; line-height: 1.6; color: var(--t1); }

    /* ── Cross analysis ── */
    .highlight { background: linear-gradient(130deg, #2658e0 0%, #3671ff 100%); border-radius: 12px; padding: 18px 22px; color: #fff; margin-bottom: 12px; box-shadow: 0 12px 26px rgba(38, 88, 224, 0.28); }
    .highlight .hl-label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; opacity: 0.65; margin-bottom: 6px; }
    .highlight .hl-text { font-size: 13px; line-height: 1.7; }

    /* ── Misc ── */
    .sec-title { font-family: 'Outfit', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { background: var(--card); border: 1px solid #e4eaf3; border-radius: 12px; padding: 16px 18px; box-shadow: 0 8px 20px rgba(20, 37, 67, 0.05); }
    .card-label { font-size: 10px; font-weight: 700; color: var(--t3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .card-val { font-size: 13px; color: var(--t1); line-height: 1.65; }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    .flow-sec { margin-bottom: 22px; }
    .click-row { border: 1px solid #e5eaf4; border-radius: 10px; padding: 11px 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s, transform 0.12s; background: #fbfdff; }
    .click-row:hover { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); transform: translateY(-1px); }
    .click-row strong { display: inline-flex; align-items: center; gap: 4px; font-size: 12.5px; color: var(--t1); }
    .click-row p { margin-top: 5px; font-size: 12.5px; color: var(--t2); line-height: 1.6; }
    .info-ic { display: inline-flex; width: 15px; height: 15px; border-radius: 999px; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--accent); border: 1px solid #bfdbfe; background: #eff6ff; cursor: pointer; vertical-align: middle; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(20, 20, 20, 0.36); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
    .modal-card { width: min(760px, 96vw); max-height: 88vh; overflow-y: auto; background: var(--card); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.18); padding: 18px 20px; }
    .modal-hdr { display: flex; align-items: flex-start; gap: 10px; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
    .modal-title { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .modal-sub { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .modal-close { border: 1px solid var(--border); background: var(--bg); color: var(--t2); border-radius: 6px; padding: 5px 8px; font-size: 12px; cursor: pointer; }
    .modal-close:hover { color: var(--t1); border-color: #d8d8d8; }
    .modal-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .modal-body { font-size: 13px; color: var(--t1); line-height: 1.75; white-space: normal; }
    .modal-link { margin-top: 10px; font-size: 12px; }
    .modal-link a { color: var(--accent); text-decoration: none; }
    .modal-quotes { margin-top: 12px; }
    .tag-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .tag { display: inline-flex; align-items: center; border-radius: 999px; padding: 5px 10px; font-size: 11.5px; font-weight: 600; border: 1px solid; cursor: pointer; }
    .tag.must { background: #ecfdf5; color: #166534; border-color: #86efac; }
    .tag.anti { background: #fef2f2; color: #991b1b; border-color: #fca5a5; }
    .tag:hover { filter: brightness(0.98); }
    .meta-chips { display: inline-flex; gap: 5px; margin-left: 7px; vertical-align: middle; }
    .bmc-map-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .bmc-cell.infra { background: #f0fdf4; border-color: #bbf7d0; }
    .bmc-cell.customer { background: #f0f9ff; border-color: #bae6fd; }
    .bmc-cell.finance { background: #faf5ff; border-color: #e9d5ff; }
    .bmc-cell.core { background: #eff6ff; border-color: #bfdbfe; }
    .checklist { display: grid; gap: 8px; margin-top: 6px; }
    .check-item { border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; background: #fff; }
    .check-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; }
    .check-icon { width: 16px; text-align: center; }
    .check-reason { margin-top: 4px; font-size: 12px; color: var(--t2); line-height: 1.55; }
    .center { display: flex; align-items: center; justify-content: center; flex: 1; flex-direction: column; gap: 12px; min-height: 200px; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .c-desc { font-size: 12.5px; color: var(--t2); text-align: center; max-width: 260px; }
    @media (max-width: 900px) {
      .grid2 { grid-template-columns: 1fr; }
      .bmc-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
      .bmc-kp, .bmc-ka, .bmc-kr, .bmc-vp, .bmc-cr, .bmc-ch, .bmc-cs, .bmc-cost, .bmc-rev { grid-column: auto; grid-row: auto; }
    }
    @media (max-width: 560px) {
      .bmc-grid { grid-template-columns: 1fr; }
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #DDD; border-radius: 4px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-top">
    <div class="sb-logo">Business<em>Research</em></div>
    <select class="sb-select" id="projectSel" onchange="onSelectProject(this.value)">

function boot(data) {
  if (!data || !data.detail) { showEmpty(); return; }
  S.projects = data.projects || [];
  S.detail = data.detail;
  S.mode = 'compare'; S.bizIdx = 0; S.modal = null; S.compareInsightOpen = false;
  buildProjectSel(S.projects);
  buildSidebar(S.detail.businesses || []);
  render();
}

function onSelectProject(pid) {
  if (!pid || typeof google === 'undefined') return;
  setMainHtml('<div class="center"><div class="spinner"></div></div>');
  google.script.run
    .withSuccessHandler(function(d) { if (d) { S.detail = d; S.mode = 'compare'; S.bizIdx = 0; S.modal = null; S.compareInsightOpen = false; buildSidebar(d.businesses || []); render(); } })
    .withFailureHandler(function(e) { showMsg('error', e.message); })
    .getResearchData(pid);
}

// ─── Sidebar ──────────────────────────────────────────
function buildProjectSel(projects) {
  var sel = document.getElementById('projectSel');
  sel.innerHTML = !projects.length ? '<option>プロジェクトなし</option>'
    : projects.map(function(p) { return '<option value="' + esc(p.id) + '">' + esc(p.name) + ' · ' + esc(p.date) + '</option>'; }).join('');
}

function buildSidebar(businesses) {
  if (!businesses.length) { document.getElementById('bizGroup').style.display = 'none'; return; }
  document.getElementById('bizGroup').style.display = '';
  document.getElementById('bizList').innerHTML = businesses.map(function(b, i) {
    var isT = b.role === '調査対象';
    return '<div class="sb-item biz-btn" onclick="goBiz(' + i + ',this)">' +
      '<span class="sb-ic">' + (isT ? '🎯' : '○') + '</span>' +
      '<span>' + esc(b.businessName) + '</span>' +
      (isT ? '' : '<span class="sb-rt">' + esc(shortRole(b.role)) + '</span>') +
    '</div>';
  }).join('');
}

function shortRole(r) {
  if (!r) return '';
  if (r.indexOf('直接') >= 0) return '直競';
  if (r.indexOf('間接') >= 0) return '間接';
  if (r.indexOf('代替') >= 0) return '代替';
  if (r.indexOf('比較') >= 0) return '比較';
  return (r || '').slice(0, 2);
}

function setMode(m) {
  S.mode = m; S.modal = null;
  if (m === 'compare') S.compareInsightOpen = false;
  document.getElementById('compareBtn').classList.toggle('active', m === 'compare');
  document.querySelectorAll('.biz-btn').forEach(function(e) { e.classList.remove('active'); });
  render();
}

function goBiz(idx, el) {
  S.mode = 'individual'; S.bizIdx = idx; S.modal = null;
  document.getElementById('compareBtn').classList.remove('active');
  document.querySelectorAll('.biz-btn').forEach(function(e) { e.classList.remove('active'); });
  el.classList.add('active');
  render();
}

function goBizFromCompare(idx) {
  var list = document.querySelectorAll('.biz-btn');
  var target = list[idx];
  if (!target) return;
  goBiz(idx, target);
}

function toggleCompareInsight() {
  S.compareInsightOpen = !S.compareInsightOpen;
  render(true);
}

function openDetailModal(payload) { S.modal = payload || null; render(true); }
function closeDetailModal() { S.modal = null; render(true); }

// ─── Render ───────────────────────────────────────────
function render(keepScroll) {
  var prevScroll = 0;
  if (keepScroll) {
    var mainEl = document.getElementById('mainWrap');
    if (mainEl) prevScroll = mainEl.scrollTop || 0;
  }
  var d = S.detail;
  if (!d) return;
  var businesses = d.businesses || [];
  var biz = businesses[S.bizIdx] || null;
  var cross = d.crossAnalyses || [];
  var project = d.project || {};

  if (S.mode === 'compare') {
    setMainHtml(renderCompareView(businesses, project, cross));
    return;
  }

  // Individual mode (single-page flow)
  var indivHtml = biz ? renderIndividualView(biz, project, cross) : '';
  var modalHtml = S.modal ? renderDetailModal(S.modal) : '';
  setMainHtml(indivHtml + modalHtml);
  if (keepScroll) {
    var mainEl2 = document.getElementById('mainWrap');
    if (mainEl2) mainEl2.scrollTop = prevScroll;
  }
}

function setMainHtml(html) {
  document.getElementById('mainWrap').innerHTML = html;
}

// ─── Compare view ─────────────────────────────────────
function renderCompareView(businesses, project, cross) {
  if (!businesses.length) return '<div class="center"><div class="c-desc">データがありません</div></div>';

  var rows = [
    { label: '売上（推定）', info: 'KPI', tone: 'ct-tone-blue', fn: function(b) {
      var fin = b.financials;
      var kpi = b.kpi ? '<div style="color:var(--green);font-weight:600">' + esc(trunc(b.kpi, 60)) + '</div>' : '';
      var revSim = (fin && fin.revenue) ? '<div style="color:var(--green);margin-top:3px">シミュ: ' + esc(trunc(fin.revenue.summary, 50)) + '</div>' : '';
      if (!kpi && !revSim) return '<span class="ct-empty">—</span>';
      return kpi + revSim;
    }},
    { label: 'コスト・利益（推定）', info: '利益構造', tone: 'ct-tone-blue', fn: function(b) {
      var fin = b.financials;
      if (!fin) {
        var cost = (b.bmc || {}).costStructure || '';
        return cost ? esc(trunc(cost, 70)) : '<span class="ct-empty">—</span>';
      }
      var parts = [];
      if (fin.cost) parts.push('<span style="color:var(--amber)">コスト: ' + esc(trunc(fin.cost.summary, 45)) + '</span>');
      if (fin.profit) parts.push('<span style="color:var(--accent)">利益: ' + esc(trunc(fin.profit.summary, 45)) + '</span>');
      return parts.length ? parts.join('<br>') : '<span class="ct-empty">—</span>';
    }},
    { label: '顧客層', info: '顧客セグメント', tone: 'ct-tone-green', fn: function(b) {
      var customer = findA(b.analyses, '顧客');
      var text = customer ? customer.conclusion : (b.bmc || {}).customerSegments || '';
      return text ? esc(trunc(text, 80)) : '<span class="ct-empty">—</span>';
    }},
    { label: '選ばれる理由', info: '価値提案', tone: 'ct-tone-green', fn: function(b) {
      var value = findA(b.analyses, '価値');
      var text = value ? value.conclusion : (b.bmc || {}).valueProposition || '';
      return text ? esc(trunc(text, 80)) : '<span class="ct-empty">—</span>';
    }},
    { label: '収益モデル', info: 'ビジネスモデルキャンバス', tone: 'ct-tone-green', fn: function(b) {
      var r = (b.bmc || {}).revenueStreams || b.pricing || '';
      return r ? esc(trunc(r, 80)) : '<span class="ct-empty">—</span>';
    }},
    { label: '強み', tone: 'ct-tone-neutral', fn: function(b) {
      var a = findA(b.analyses, '価値');
      return a ? '<span style="color:var(--green)">' + esc(trunc(a.conclusion, 80)) + '</span>' : '<span class="ct-empty">—</span>';
    }},
    { label: '不満・弱み', tone: 'ct-tone-caution', fn: function(b) {
      var diss = findA(b.analyses, '不満');
      return diss ? '<span style="color:var(--red)">' + esc(trunc(diss.conclusion, 80)) + '</span>' : '<span class="ct-empty">—</span>';
    }}
  ];

  var html = '<div class="content">';
  html += '<div style="margin-bottom:18px"><span style="font-family:Outfit,sans-serif;font-size:18px;font-weight:700;letter-spacing:-0.02em">' + esc(project['プロジェクト名'] || '') + ' — 競争環境</span></div>';
  html += '<div style="margin-bottom:16px">' + renderStrategicGuardrailSection(businesses, cross) + '</div>';

  html += '<div class="compare-wrap"><table class="compare-table">';
  // Header row
  html += '<thead><tr>';
  html += '<th class="ct-dim ct-hdr-dim">事業</th>';
  businesses.forEach(function(b, i) {
    var isT = b.role === '調査対象';
    var serviceName = esc(b.serviceName || b.businessName || '');
    var serviceLink = '<a href="#" onclick="goBizFromCompare(' + i + ');return false;">' + serviceName + '</a>';
    var summary = (b.bmc || {}).valueProposition || '';
    html += '<th class="ct-biz ct-hdr-biz' + (isT ? ' ct-target' : '') + '">' +
      '<div class="ct-biz-sub" style="margin-bottom:5px">' + roleBadgeHtml(b.role) + '</div>' +
      '<div class="ct-biz-name">' + (isT ? '🎯 ' : '') + serviceLink + '</div>' +
      '<div class="ct-biz-sub">' + (summary ? esc(trunc(summary, 70)) : '事業概要なし') + '</div>' +
      '<div style="margin-top:6px"><a href="#" onclick="goBizFromCompare(' + i + ');return false;" style="font-size:11px;color:var(--accent);font-weight:600;text-decoration:none">詳細を見る →</a></div>' +
    '</th>';
  });
  html += '</tr></thead>';

  // Dimension rows
  html += '<tbody>';
  rows.forEach(function(row) {
    var label = '<span class="ct-row-label">' + row.label + (row.info ? infoIcon(row.info) : '') + '</span>';
    html += '<tr class="' + (row.tone || '') + '"><td class="ct-dim">' + label + '</td>';
    businesses.forEach(function(b) {
      html += '<td class="ct-biz">' + row.fn(b) + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  html += '</div>';
  return html;
}

// ─── Financials Section ───────────────────────────────
function renderFinancialsSection(biz) {
  var fin = biz.financials;
  if (!fin) return '';
  var ev = fin.evidenceLevel || '推定';
  var evClass = ev === '事実' ? 'b-green' : ev === '推定' ? 'b-amber' : 'b-gray';

  function finCard(data, label, colorStyle) {
    if (!data) return '';
    var items = (data.items || []).map(function(item) {
      return '<li>' + esc(item) + '</li>';
    }).join('');
    return '<div class="fin-card">' +
      '<div class="fin-card-label">' + esc(label) + '</div>' +
      '<div class="fin-card-summary" style="' + colorStyle + '">' + esc(data.summary || '—') + '</div>' +
      (items ? '<ul class="fin-card-items">' + items + '</ul>' : '') +
    '</div>';
  }

  var html = '<div class="flow-sec">';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
  html += '<div style="font-size:12px;font-weight:700;color:var(--t2);letter-spacing:0.04em;text-transform:uppercase">財務シミュレーション</div>';
  html += '<span class="badge ' + evClass + '">' + esc(ev) + '</span>';
  html += '</div>';
  html += '<div class="fin-grid">';
  html += finCard(fin.revenue, '売上', 'color:var(--green)');
  html += finCard(fin.cost,    'コスト', 'color:var(--amber)');
  html += finCard(fin.profit,  '利益', 'color:var(--accent)');
  html += '</div></div>';
  return html;
}

// ─── Individual: Summary board ───────────────────────
function renderIndividualView(biz, project, cross) {
  var html = renderSummaryBoard(biz, project);
  html += '<div class="content">';
  html += renderBmcVisualSection(biz);
  html += renderFinancialsSection(biz);
  html += '</div>';
  return html;
}

function renderSummaryBoard(biz, project) {
  var bmcVP   = (biz.bmc || {}).valueProposition || '';
  var co = biz.company || {};
  var coText = co.name ? co.name + (co.scale ? ' · ' + co.scale : '') : '';
  var recentSummary = getRecentSummaryText(biz);
  var externalSummary = getExternalSummaryText(biz);

  var html = '<div class="sum-board">';
  html += '<div class="sum-hdr"><div style="flex:1">';
  html += '<div class="sum-name">' + esc(biz.serviceName || biz.businessName) + '</div>';
  html += '<div class="sum-meta">';
  if (biz.url) html += '<a href="' + esc(biz.url) + '" target="_blank" rel="noopener">' + esc(biz.url) + '</a>';
  if (biz.url && coText) html += '<span style="color:var(--border)">·</span>';
  if (coText) html += '<span>' + esc(coText) + '</span>';
  html += '</div>';
  html += '<div class="sum-badges">';
  if (biz.kpi) html += '<span class="sum-kpi">' + esc(biz.kpi) + '</span>';
  html += '</div></div></div>';
  html += '<div class="sum-bullets">';
  html += sumBullet('概要', bmcVP || '');
  html += sumBullet('直近の動き', recentSummary || 'データなし', actionInfoIcon('openFutureModal()'));
  html += sumBullet('外部評価', externalSummary || 'データなし', actionInfoIcon('openExternalSummaryModal()'));
  html += '</div></div>';
  return html;
}

function sumBullet(label, text, actionIconHtml) {
  if (!text) return '';
  return '<div class="sum-bullet"><span class="sum-bullet-label">' + esc(label) + (actionIconHtml ? ' ' + actionIconHtml : '') + '</span><span class="sum-bullet-text">' + esc(trunc(text, 128)) + '</span></div>';
}

function actionInfoIcon(onclickCode) {
  return '<span class="info-ic" onclick="event.stopPropagation();' + onclickCode + '">i</span>';
}

function getRecentSummaryText(biz) {
  var recentA = findA(biz.analyses || [], '直近の動き');
  if (recentA && recentA.conclusion) return recentA.conclusion;
  var latestNews = (biz.news || [])[0];
  if (!latestNews) return '';
  var title = latestNews['タイトル'] || latestNews.title || '';
  var summary = latestNews['要点'] || latestNews.summary || '';
  return [title, summary].filter(Boolean).join(' / ');
}

function getExternalSummaryText(biz) {
  var quotes = (biz.quotes || []).filter(function(q) { return (q['観点'] || q.perspective) === 'アナリスト'; });
  if (!quotes.length) return '';
  return quotes[0]['引用テキスト'] || quotes[0].text || '';
}

function renderStrategicGuardrailSection(businesses, cross) {
  var abs = getAbsoluteElements(businesses);
  var anti = getAntiTeacherPointsFromBusinesses(businesses);
  var crossA = (cross || []).find(function(c) { return c.perspective === '示唆'; });
  var html = '<div class="compare-intro">';
  html += '<div class="compare-intro-head">';
  html += '<label class="compare-toggle"><input type="checkbox" ' + (S.compareInsightOpen ? 'checked' : '') + ' onchange="toggleCompareInsight()"><span>参入にあたっての解釈</span></label>';
  html += '</div>';
  if (S.compareInsightOpen) {
    html += '<div class="compare-intro-body">';
    if (crossA) {
      html += '<div class="card" onclick="openCrossModal()" style="cursor:pointer">' +
        '<div class="card-label">横断した勝ち筋仮説 · 全事業横断分析</div>' +
        '<div class="card-val">' + esc(crossA.conclusion) + '</div>' +
      '</div>';
    }
    html += '<div class="grid2">';
    html += '<div class="card"><div class="card-label">絶対に抑えるべき要素（各社共通）</div>';
    if (abs.length) {
      html += '<ul class="anti-list">';
      abs.forEach(function(v, i) { html += '<li onclick="openMustHaveModal(' + i + ')" style="cursor:pointer">' + esc(v.label) + '</li>'; });
      html += '</ul>';
    } else {
      html += '<div class="card-val" style="color:var(--t3)">共通要素を抽出できませんでした。データ件数が増えると精度が上がります。</div>';
    }
    html += '</div>';
    html += '<div class="card"><div class="card-label">反面教師ポイント（優先で回避）</div>';
    if (anti.length) {
      html += '<ul class="anti-list">';
      anti.forEach(function(v, i) { html += '<li onclick="openAntiPointModal(' + i + ')" style="cursor:pointer">' + esc(v.detail || v.label) + '</li>'; });
      html += '</ul>';
    } else {
      html += '<div class="card-val" style="color:var(--t3)">反面教師ポイントは未抽出です。</div>';
    }
    html += '</div>';
    html += '</div>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

    bmcClassicCell('cost', 'bmc-cost finance','コスト構造',     b.costStructure) +

function bmcClassicCell(key, cls, label, val) {
  return '<div class="bmc-cell ' + cls + '" onclick="openBmcModal(\'' + key + '\')">' +
    '<div class="bmc-label">' + esc(label) + '</div>' +
    '<div class="bmc-val' + (val ? '' : ' bmc-empty') + '">' + esc(trunc(val || '未記入', 120)) + '</div>' +
  '</div>';
}

function analysisMetaChips(ana) {
  if (!ana) return '';
  var chips = [];
  if (ana.evidenceLevel) chips.push('<span class="badge ' + (ana.evidenceLevel === '事実' ? 'b-green' : ana.evidenceLevel === '推定' ? 'b-amber' : 'b-gray') + '">' + esc(ana.evidenceLevel) + '</span>');
  if (ana.confidence) chips.push('<span class="badge b-gray">確信度:' + esc(ana.confidence) + '</span>');
  return chips.length ? '<span class="meta-chips">' + chips.join('') + '</span>' : '';
}

// ─── Tab ①: ビジネスモデル ────────────────────────────
function renderBmcTab(biz) {
  var b = biz.bmc || {};
  function cell(key, cls, labelText, val) {
    var isActive = S.bmcBlock === key;
    return '<div class="bmc-cell ' + cls + (isActive ? ' active' : '') + '" onclick="clickBmcBlock(\'' + key + '\')">' +
      '<div class="bmc-label">' + labelText + (hasDetail(key, biz) ? ' <span style="color:var(--accent);font-size:9px">▸</span>' : '') + '</div>' +
      '<div class="bmc-val' + (val ? '' : ' bmc-empty') + '">' + esc(val || '未記入') + '</div>' +
      '<div class="bmc-hint">' + (isActive ? 'クリックで閉じる' : '詳細を見る') + ' ↓</div>' +
    '</div>';
  }
  var html = '';
  if (S.bmcBlock) html += renderBmcDetailPanel(biz);

  html += '<div class="bmc-grid">' +
    cell('kp',   'bmc-kp',   '主要パートナー', b.keyPartners) +
    cell('ka',   'bmc-ka',   '主要活動',       b.keyActivities) +
    cell('vp',   'bmc-vp',   '価値提案 💎',    b.valueProposition) +
    cell('cr',   'bmc-cr',   '顧客との関係',   b.customerRelationships) +
    cell('cs',   'bmc-cs',   '顧客セグメント', b.customerSegments) +
    cell('kr',   'bmc-kr',   '主要リソース',   b.keyResources) +
    cell('ch',   'bmc-ch',   'チャネル',       b.channels) +
    cell('cost', 'bmc-cost', 'コスト構造 💸',  b.costStructure) +
    cell('rev',  'bmc-rev',  '収益の流れ 💰',  b.revenueStreams) +
  '</div>';

  return html;
}

function hasDetail(key, biz) {
  var anaMap = { vp: '価値', cs: '顧客', ka: '仕組み', kr: '仕組み' };
  if (anaMap[key] && findA(biz.analyses, anaMap[key])) return true;
  if (key === 'rev' && (biz.pricing || biz.kpi)) return true;
  return false;
}

var BMC_CONFIG = {
  kp:   { label: '主要パートナー', title: '外部リソースとの連携',              ana: null,    quotePs: [] },
  ka:   { label: '主要活動',       title: '価値を生み出す活動',               ana: '仕組み', quotePs: ['仕組み'] },
  vp:   { label: '価値提案',       title: 'なぜ選ばれているか',               ana: '価値',  quotePs: ['価値'] },
  cr:   { label: '顧客との関係',   title: '顧客維持・関係構築の仕組み',       ana: null,    quotePs: ['顧客'] },
  cs:   { label: '顧客セグメント', title: '誰に選ばれているか / 誰には届いていないか', ana: '顧客',  quotePs: ['顧客'], special: 'customer' },
  kr:   { label: '主要リソース',   title: '競合優位性を支えるリソース',       ana: '仕組み', quotePs: ['仕組み'] },
  ch:   { label: 'チャネル',       title: 'どこで・どう顧客に届くか',         ana: null,    quotePs: ['顧客'] },
  cost: { label: 'コスト構造',     title: 'コスト構造の詳細',                 ana: null,    quotePs: [] },
  rev:  { label: '収益の流れ',     title: '収益モデルの詳細',                 ana: null,    quotePs: [], special: 'revenue' }
};

function renderBmcDetailPanel(biz) {
  var key = S.bmcBlock;
  var cfg = BMC_CONFIG[key];
  if (!cfg) return '';
  var b = biz.bmc || {};
  var a = biz.analyses || [];
  var quotes = biz.quotes || [];
  var bmcText = { kp: b.keyPartners, ka: b.keyActivities, vp: b.valueProposition, cr: b.customerRelationships, cs: b.customerSegments, kr: b.keyResources, ch: b.channels, cost: b.costStructure, rev: b.revenueStreams }[key] || '';

  var html = '<div class="bmc-detail">';
  html += '<div class="bmc-detail-hdr">' +
    '<span class="badge b-blue">' + esc(cfg.label) + '</span>' +
    '<span class="bmc-detail-title">' + esc(cfg.title) + '</span>' +
    '<span class="bmc-detail-close" onclick="clickBmcBlock(\'' + key + '\')">✕ 閉じる</span>' +
  '</div>';

  // BMC text
  if (bmcText) {
    html += '<div class="bmc-sub-label">概要</div>';
    html += '<div style="font-size:13px;color:var(--t1);line-height:1.7;margin-bottom:4px">' + esc(bmcText) + '</div>';
  }

  // Special: revenue
  if (cfg.special === 'revenue') {
    if (biz.pricing) {
      html += '<div class="bmc-sub-label" style="margin-top:12px">価格帯（実数値）</div>';
      html += '<div style="font-size:13.5px;font-weight:600;color:var(--t1)">' + esc(biz.pricing) + '</div>';
    }
    if (biz.kpi) {
      html += '<div class="bmc-sub-label" style="margin-top:10px">主要KPI</div>';
      html += '<div style="font-size:13.5px;font-weight:600;color:var(--green)">' + esc(biz.kpi) + '</div>';
    }
  }

  // Linked analysis
  if (cfg.ana) {
    var linkedAna = findA(a, cfg.ana);
    if (linkedAna) {
      html += '<div class="bmc-sub-label" style="margin-top:14px">分析</div>';
      html += '<div class="ana-block" style="margin-bottom:8px">' +
        '<div class="ana-hdr"><span class="badge b-ai">AI分析</span><span class="badge b-blue">' + esc(cfg.ana) + '</span>' + confBadge(linkedAna.confidence) + evBadge(linkedAna.evidenceLevel) + '</div>' +
        '<div class="ana-text">' + esc(linkedAna.conclusion) + '</div>' +
        renderEvidence(linkedAna.evidence) +
      '</div>';
    }
  }

  // Special: customer — show who is and isn't choosing
  if (cfg.special === 'customer') {
    var dissA = findA(a, '不満');
    var posQuotes = quotes.filter(function(q) { return (q['感情'] || q.sentiment) === 'ポジティブ' && (q['観点'] || q.perspective) === '顧客'; });
    var negQuotes = quotes.filter(function(q) { return (q['感情'] || q.sentiment) === 'ネガティブ'; });

    if (posQuotes.length) {
      html += '<div class="bmc-sub-label" style="margin-top:14px">✅ 選ばれているユーザーの声</div>';
      posQuotes.slice(0, 3).forEach(function(q) { html += renderQuoteCard(q, '😊'); });
    }
    if (dissA) {
      html += '<div class="bmc-sub-label" style="margin-top:14px">❌ 選ばれていない層・離脱理由</div>';
      html += '<div class="ana-block" style="margin-bottom:8px">' +
        '<div class="ana-hdr"><span class="badge b-ai">AI分析</span><span class="badge b-amber">不満</span></div>' +
        '<div class="ana-text">' + esc(dissA.conclusion) + '</div>' +
      '</div>';
    }
    if (negQuotes.length) {
      negQuotes.slice(0, 3).forEach(function(q) { html += renderQuoteCard(q, '😞'); });
    }
  } else {
    // Generic quotes for other blocks
    var relQuotes = cfg.quotePs.length ? quotes.filter(function(q) { return cfg.quotePs.indexOf(q['観点'] || q.perspective) >= 0 && (q['観点'] || q.perspective) !== 'アナリスト'; }) : [];
    if (relQuotes.length) {
      html += '<div class="bmc-sub-label" style="margin-top:14px">ユーザーの声</div>';
      relQuotes.slice(0, 3).forEach(function(q) {
        var sent = q['感情'] || q.sentiment || '';
        var icon = sent === 'ポジティブ' ? '😊' : sent === 'ネガティブ' ? '😞' : '💬';
        html += renderQuoteCard(q, icon);
      });
    }
  }

  html += '</div>';
  return html;
}

// ─── Tab ②: 直近の動き ───────────────────────────────
function renderRecentTab(biz) {
  var a = biz.analyses || [];
  var recentAna = findA(a, '直近の動き');
  var news = biz.news || [];
  var html = '';

  html += '<div class="news-summary-block">';
  html += '<div class="news-summary-label">戦略的解釈</div>';
  if (recentAna) {
    html += '<div class="news-summary-text">' + esc(recentAna.conclusion) + '</div>';
  } else {
    html += '<div class="news-summary-text" style="color:var(--t3);font-style:italic">「直近の動き」分析がありません。調査JSONの analyses[] に perspective: "直近の動き" で追加してください。</div>';
  }
  html += '</div>';

  if (news.length) {
    html += '<div class="news-list-label">最新情報 · ' + news.length + '件</div>';
    news.forEach(function(n) {
      var title = n['タイトル'] || n.title || '';
      var url   = n['URL']    || n.url  || '';
      var date  = n['日付']   || n.date || '';
      var type  = n['種別']   || n.type || '';
      var summ  = n['要点']   || n.summary || '';
      var icon  = type.indexOf('YouTube') >= 0 ? '▶' : type.indexOf('プレス') >= 0 ? '📢' : type.indexOf('ブログ') >= 0 ? '✍' : type.indexOf('お知らせ') >= 0 ? '📣' : '📰';
      html += '<div class="news-item">' +
        '<div class="news-icon">' + icon + '</div>' +
        '<div class="news-body">' +
          '<div class="news-title">' + (url ? '<a href="' + esc(url) + '" target="_blank" rel="noopener">' + esc(title) + '</a>' : esc(title)) + '</div>' +
          (summ ? '<div class="news-snippet">' + esc(summ) + '</div>' : '') +
          '<div class="news-foot">' + (date ? '<span>' + esc(String(date).slice(0,10)) + '</span>' : '') + (type ? '<span class="news-type-tag">' + esc(type) + '</span>' : '') + '</div>' +
        '</div>' +
      '</div>';
    });
  } else {
    html += '<div style="color:var(--t3);font-size:12.5px">ニュースがありません（news[] を調査JSONに含めてください）</div>';
  }
  return html;
}

// ─── Tab ③: アナリスト見解 ───────────────────────────
function renderAnalystTab(biz, cross) {
  var a = biz.analyses || [];
  var quotes = biz.quotes || [];
  var analystQuotes = quotes.filter(function(q) { return (q['観点'] || q.perspective) === 'アナリスト'; });
  var html = '';

  // AI analyses (all perspectives except 直近の動き and 示唆)
  var aiPerspectives = ['顧客', '価値', '仕組み', '不満'];
  var perspConfig = {
    '顧客': { badge: 'b-blue',   label: '顧客セグメント分析' },
    '価値': { badge: 'b-green',  label: '価値提案・選ばれる理由' },
    '仕組み': { badge: 'b-purple', label: '勝ち方の仕組み' },
    '不満': { badge: 'b-amber',  label: '不満・弱み' }
  };

  var hasAI = false;
  aiPerspectives.forEach(function(p) {
    var ana = findA(a, p);
    if (!ana) return;
    if (!hasAI) { html += '<div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:0.09em;text-transform:uppercase;margin-bottom:10px">AI分析</div>'; hasAI = true; }
    var cfg = perspConfig[p] || { badge: 'b-gray', label: p };
    html += '<div class="analyst-item">' +
      '<div class="ana-hdr"><span class="badge b-ai">AI</span><span class="badge ' + cfg.badge + '">' + esc(p) + '</span>' + confBadge(ana.confidence) + evBadge(ana.evidenceLevel) + '</div>' +
      '<div class="ana-text">' + esc(ana.conclusion) + '</div>' +
      renderEvidence(ana.evidence) +
    '</div>';
  });

  // External analyst opinions
  html += '<div style="height:10px"></div>';
  html += '<div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:0.09em;text-transform:uppercase;margin-bottom:10px">外部評価・メディア報道</div>';

  if (analystQuotes.length) {
    analystQuotes.forEach(function(q) {
      var text = q['引用テキスト'] || q.text || '';
      var source = q['顧客属性'] || q.customerProfile || '';
      var sent = q['感情'] || q.sentiment || '';
      var sentIcon = sent === 'ポジティブ' ? '😊' : sent === 'ネガティブ' ? '😞' : '💬';
      var srcObj = q['ソースID'] ? null : null; // source URL lookup would need enrichment
      html += '<div class="analyst-item">' +
        '<div class="ana-hdr"><span class="badge b-human">外部評価</span>' +
          (sent ? '<span class="badge b-gray">' + sentIcon + ' ' + esc(sent) + '</span>' : '') +
        '</div>' +
        '<div class="analyst-text">"' + esc(text) + '"</div>' +
        (source ? '<div class="analyst-source">— ' + esc(source) + '</div>' : '') +
      '</div>';
    });
  } else {
    html += '<div style="background:var(--bg);border:1px dashed var(--border);border-radius:8px;padding:16px 18px;font-size:12.5px;color:var(--t3)">' +
      '外部評価はまだありません。<br>調査JSONの <code>quotes[]</code> に <code>perspective: "アナリスト"</code> と <code>customerProfile: "媒体名/評価者名"</code> で追加してください。' +
    '</div>';
  }

  // Cross analysis
  var crossA = cross.find(function(c) { return c.perspective === '示唆'; });
  if (crossA) {
    html += '<div style="margin-top:22px">' +
      '<div class="highlight">' +
        '<div class="hl-label">💡 全事業横断 · 勝ち筋仮説</div>' +
        '<div class="hl-text">' + esc(crossA.conclusion) + '</div>' +
      '</div>' +
      renderEvidence(crossA.evidence) +
    '</div>';
  }

  return html;
}

function getCurrentBiz() {
  var businesses = (S.detail && S.detail.businesses) || [];
  return businesses[S.bizIdx] || null;
}

function openAnalysisModal(perspective) {
  var biz = getCurrentBiz();
  if (!biz) return;
  var ana = findA(biz.analyses || [], perspective);
  if (!ana) return;
  openDetailModal({
    title: perspective + ' の詳細',
    subtitle: (biz.serviceName || biz.businessName || '') + ' · AI分析',
    body: ana.conclusion || '',
    evidence: ana.evidence || [],
    badges: [ana.confidence ? ('確信度:' + ana.confidence) : '', ana.evidenceLevel || ''].filter(Boolean)
  });
}

function openBmcModal(key) {
  var biz = getCurrentBiz();
  if (!biz) return;
  var b = biz.bmc || {};
  var map = {
    rev: { title: '収益モデル', body: b.revenueStreams || biz.pricing || '' },
    cost:{ title: 'コスト構造', body: b.costStructure || '' },
    cs:  { title: '顧客セグメント', body: b.customerSegments || '' },
    vp:  { title: '提供価値', body: b.valueProposition || '' },
    ka:  { title: '価値実装（主要活動 / 主要リソース）', body: ((b.keyActivities || '') + '\n' + (b.keyResources || '')).trim() },
    ch:  { title: '販促チャネル', body: ((b.channels || '') + '\n' + (b.customerRelationships || '')).trim() },
    kpi: { title: '主要KPI', body: biz.kpi || '' },
    kp:  { title: '主要パートナー', body: b.keyPartners || '' },
    kr:  { title: '主要リソース', body: b.keyResources || '' },
    cr:  { title: '顧客との関係', body: b.customerRelationships || '' }
  };
  var item = map[key];
  if (!item) return;
  openDetailModal({
    title: item.title,
    subtitle: (biz.serviceName || biz.businessName || '') + ' · 構造ファクト',
    body: item.body || '未記入',
    evidence: []
  });
}

function openAnalystModal(mode) {
  var biz = getCurrentBiz();
  if (!biz) return;
  var analystQuotes = (biz.quotes || []).filter(function(q) { return (q['観点'] || q.perspective) === 'アナリスト'; });
  var filtered = analystQuotes.filter(function(q) {
    var s = q['感情'] || q.sentiment || '';
    return mode === 'negative' ? s === 'ネガティブ' : s !== 'ネガティブ';
  });
  if (!filtered.length) return;
  var items = filtered.map(function(q) {
    return {
      text: q['引用テキスト'] || q.text || '',
      meta: q['顧客属性'] || q.customerProfile || (q['感情'] || q.sentiment || '')
    };
  });
  openDetailModal({
    title: mode === 'negative' ? '専門家・アナリストの否定評価' : '専門家・アナリストの肯定評価',
    subtitle: (biz.serviceName || biz.businessName || '') + ' · 外部コメント',
    body: '',
    quoteItems: items
  });
}

function openNewsModal(idx) {
  var biz = getCurrentBiz();
  if (!biz) return;
  var n = (biz.news || [])[idx];
  if (!n) return;
  openDetailModal({
    title: n['タイトル'] || n.title || 'ニュース',
    subtitle: ((n['日付'] || n.date || '') + ' ' + (n['種別'] || n.type || '')).trim(),
    body: n['要点'] || n.summary || '',
    link: n['URL'] || n.url || ''
  });
}

function openEvaluationModal() {
  var biz = getCurrentBiz();
  if (!biz) return;
  var analyses = biz.analyses || [];
  var quotes = biz.quotes || [];
  var valueA = findA(analyses, '価値');
  var mechanismA = findA(analyses, '仕組み');
  var dissA = findA(analyses, '不満');
  var posAnalyst = quotes.filter(function(q) { return (q['観点'] || q.perspective) === 'アナリスト' && (q['感情'] || q.sentiment) !== 'ネガティブ'; });
  var negAnalyst = quotes.filter(function(q) { return (q['観点'] || q.perspective) === 'アナリスト' && (q['感情'] || q.sentiment) === 'ネガティブ'; });

  var html = '<div class="grid2">';
  html += '<div class="card"><div class="card-label">評価されている点</div>';
  if (valueA) html += '<div class="card-val"><strong>価値提案</strong><br>' + esc(valueA.conclusion) + '</div>';
  if (mechanismA) html += '<div class="card-val" style="margin-top:8px"><strong>仕組み</strong><br>' + esc(mechanismA.conclusion) + '</div>';
  if (posAnalyst.length) html += '<div class="card-val" style="margin-top:8px"><strong>外部評価</strong><br>"' + esc(posAnalyst[0]['引用テキスト'] || posAnalyst[0].text || '') + '"</div>';
  html += '</div>';
  html += '<div class="card"><div class="card-label">評価されていない点</div>';
  if (dissA) html += '<div class="card-val"><strong>弱み・不満</strong><br>' + esc(dissA.conclusion) + '</div>';
  if (negAnalyst.length) html += '<div class="card-val" style="margin-top:8px"><strong>外部評価</strong><br>"' + esc(negAnalyst[0]['引用テキスト'] || negAnalyst[0].text || '') + '"</div>';
  html += '</div></div>';
  openDetailModal({ title: '定性評価', subtitle: biz.serviceName || biz.businessName || '', bodyHtml: html });
}

function openFutureModal() {
  var biz = getCurrentBiz();
  if (!biz) return;
  var recentA = findA(biz.analyses || [], '直近の動き');
  var news = biz.news || [];
  var html = '<div class="card"><div class="card-label">AIによる方向性解釈</div><div class="card-val">' + esc(recentA ? recentA.conclusion : '未記入') + '</div></div>';
  if (news.length) {
    html += '<div style="height:10px"></div><div class="card"><div class="card-label">直近の動き</div>';
    news.slice(0, 8).forEach(function(n) {
      var title = n['タイトル'] || n.title || '';
      var date = String(n['日付'] || n.date || '').slice(0, 10);
      var url = n['URL'] || n.url || '';
      var summ = n['要点'] || n.summary || '';
      html += '<div style="padding:8px 0;border-bottom:1px solid var(--border)"><div style="font-size:12px;font-weight:600">' + (url ? '<a href="' + esc(url) + '" target="_blank" rel="noopener">' + esc(title) + '</a>' : esc(title)) + '</div><div style="font-size:11px;color:var(--t3)">' + esc(date) + '</div><div style="font-size:12px;color:var(--t2)">' + esc(trunc(summ, 140)) + '</div></div>';
    });
    html += '</div>';
  }
  openDetailModal({ title: '今後の方針', subtitle: biz.serviceName || biz.businessName || '', bodyHtml: html });
}

function openExternalSummaryModal() {
  var biz = getCurrentBiz();
  if (!biz) return;
  var analystQuotes = (biz.quotes || []).filter(function(q) { return (q['観点'] || q.perspective) === 'アナリスト'; });
  var html = '';
  if (!analystQuotes.length) {
    html = '<div class="card"><div class="card-val" style="color:var(--t3)">外部評価は未登録です。</div></div>';
  } else {
    html += '<div class="card"><div class="card-label">外部評価サマリー</div><div class="card-val">' + esc(getExternalSummaryText(biz)) + '</div></div>';
    html += '<div style="height:10px"></div><div class="card"><div class="card-label">外部評価の詳細</div>';
    analystQuotes.slice(0, 10).forEach(function(q) {
      var src = q['顧客属性'] || q.customerProfile || '';
      var sentiment = q['感情'] || q.sentiment || '';
      var text = q['引用テキスト'] || q.text || '';
      html += '<div style="padding:8px 0;border-bottom:1px solid var(--border)"><div style="font-size:11px;color:var(--t3)">' + esc([src, sentiment].filter(Boolean).join(' · ')) + '</div><div style="font-size:12px;color:var(--t1)">"' + esc(text) + '"</div></div>';
    });
    html += '</div>';
  }
  openDetailModal({ title: '外部評価', subtitle: biz.serviceName || biz.businessName || '', bodyHtml: html });
}

function getAbsoluteElements(businesses) {
  var rows = businesses || [];
  if (!rows.length) return [];
  var checks = [
    { label: 'ターゲット顧客が定義されている', detail: '顧客セグメントが明記されている', fn: function(b) { return !!((b.bmc || {}).customerSegments || findA(b.analyses || [], '顧客')); } },
    { label: '提供価値が言語化されている', detail: '価値提案が明確で、何を解決するか説明できる', fn: function(b) { return !!((b.bmc || {}).valueProposition || findA(b.analyses || [], '価値')); } },
    { label: '収益モデルが存在する', detail: '価格帯または収益の流れが定義されている', fn: function(b) { return !!(b.pricing || (b.bmc || {}).revenueStreams); } },
    { label: '販促チャネルが設計されている', detail: 'チャネルまたは顧客関係が定義されている', fn: function(b) { return !!((b.bmc || {}).channels || (b.bmc || {}).customerRelationships); } }
  ];
  return checks.filter(function(c) { return rows.every(function(b) { return c.fn(b); }); });
}

function getAntiTeacherPointsFromBusinesses(businesses) {
  var out = [];
  (businesses || []).forEach(function(biz) {
    var diss = findA((biz.analyses || []), '不満');
    if (diss && diss.conclusion) out.push({ label: trunc(diss.conclusion, 34), detail: diss.conclusion, evidence: diss.evidence || [], source: biz.businessName });
    var negAnalyst = (biz.quotes || []).filter(function(q) { return (q['観点'] || q.perspective) === 'アナリスト' && (q['感情'] || q.sentiment) === 'ネガティブ'; });
    negAnalyst.slice(0, 1).forEach(function(q) {
      out.push({ label: trunc(q['引用テキスト'] || q.text || '', 34), detail: q['引用テキスト'] || q.text || '', source: (biz.businessName || '') + ' · ' + (q['顧客属性'] || q.customerProfile || '') });
    });
  });
  return out.slice(0, 10);
}

function getAntiTeacherPoints(biz) {
  return getAntiTeacherPointsFromBusinesses([biz]);
}

function getCompareAntiPoints() {
  return getAntiTeacherPointsFromBusinesses((S.detail && S.detail.businesses) || []);
}

function getCompareCross() {
  var cross = (S.detail && S.detail.crossAnalyses) || [];
  return cross.find(function(v) { return v.perspective === '示唆'; }) || null;
}

function openMustHaveModal(idx) {
  var arr = getAbsoluteElements((S.detail && S.detail.businesses) || []);
  var item = arr[idx];
  if (!item) return;
  openDetailModal({ title: '絶対に抑えるべき要素', subtitle: item.label, body: item.detail, evidence: [] });
}

function openAntiPointModal(idx) {
  var arr = getCompareAntiPoints();
  var item = arr[idx];
  if (!item) return;
  openDetailModal({ title: '反面教師ポイント', subtitle: item.source || 'ネガティブ示唆', body: item.detail || '', evidence: item.evidence || [] });
}

function openCrossModal() {
  var c = getCompareCross();
  if (!c) return;
  openDetailModal({
    title: '横断した勝ち筋仮説',
    subtitle: '全事業横断分析',
    body: c.conclusion || '',
    evidence: c.evidence || []
  });
}

function renderDetailModal(m) {
  var html = '<div class="modal-backdrop" onclick="closeDetailModal()">';
  html += '<div class="modal-card" onclick="event.stopPropagation()">';
  html += '<div class="modal-hdr"><div><div class="modal-title">' + esc(m.title || '') + '</div>' + (m.subtitle ? '<div class="modal-sub">' + esc(m.subtitle) + '</div>' : '') + '</div><button class="modal-close" onclick="closeDetailModal()">閉じる</button></div>';
  if (m.badges && m.badges.length) html += '<div class="modal-badges">' + m.badges.map(function(b) { return '<span class="badge b-gray">' + esc(b) + '</span>'; }).join('') + '</div>';
  if (m.bodyHtml) html += '<div class="modal-body">' + m.bodyHtml + '</div>';
  else if (m.body) html += '<div class="modal-body">' + esc(m.body).replace(/\n/g, '<br>') + '</div>';
  if (m.link) html += '<div class="modal-link"><a href="' + esc(m.link) + '" target="_blank" rel="noopener">ソースを開く</a></div>';
  if (m.evidence && m.evidence.length) html += '<div style="margin-top:10px">' + renderEvidence(m.evidence) + '</div>';
  if (m.quoteItems && m.quoteItems.length) {
    html += '<div class="modal-quotes">';
    m.quoteItems.forEach(function(q) {
      html += '<div class="quote-card"><span class="quote-sent">💬</span><div class="quote-body"><div class="quote-text">"' + esc(q.text || '') + '"</div>' + (q.meta ? '<div class="quote-attr">— ' + esc(q.meta) + '</div>' : '') + '</div></div>';
    });
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

var TERM_HELP = {
  '評価軸': { title: '評価軸', body: '市場選定・提供価値・販売促進の3観点で、成功要因と失敗要因を同時に確認します。' },
  'ビジネスモデルキャンバス': { title: 'ビジネスモデルキャンバス', body: '中央の価値提案を起点に、左側（主要活動・主要資源・主要パートナー）で実現方法、右側（顧客との関係・顧客セグメント・チャネル）で届け方、下段（コスト構造・収益の流れ）で採算性を確認します。各ブロックをクリックすると詳細が開き、どこが強みでどこが詰まりやすいかを追えます。' },
  '価値提案': { title: '価値提案', body: '顧客が対価を払う理由。どの課題をどのように解決するかを示す要素です。' },
  '利益構造': { title: '利益構造', body: '売上の作り方（誰から何で課金するか）と、コストの使い方（何に投資するか）の関係です。' },
  '収益モデル': { title: '収益モデル', body: '課金形態、単価、継続率など、売上が立つメカニズムです。' },
  'コスト構造': { title: 'コスト構造', body: '固定費・変動費・獲得コストなど、利益を圧迫/強化する支出の内訳です。' },
  '顧客セグメント': { title: '顧客セグメント', body: '狙う顧客層と、あえて除外する層を分けて定義したものです。' },
  'KPI': { title: 'KPI', body: '売上・ユーザー数・効率性を継続観測するための重要指標です。' },
  '今後の方針': { title: '今後の方針', body: '直近リリースや発信を根拠に、次にどの方向へ投資するかを読むためのセクションです。' }
};

function infoIcon(term) {
  if (!TERM_HELP[term]) return '';
  return '<span class="info-ic" onclick="event.stopPropagation();openTermInfo(\'' + esc(term) + '\')">i</span>';
}

function openTermInfo(term) {
  var t = TERM_HELP[term];
  if (!t) return;
  openDetailModal({ title: t.title, subtitle: '用語説明', body: t.body, evidence: [] });
}

// ─── Helpers ─────────────────────────────────────────
function findA(analyses, perspective) {
  return (analyses || []).find(function(a) { return a.perspective === perspective; }) || null;
}

function roleBadgeHtml(role) {
  if (!role) return '';
  var cls = role === '調査対象' ? 'b-blue' : 'b-gray';
  return '<span class="badge ' + cls + '">' + esc(role) + '</span>';
}

function renderQuoteCard(q, sentIcon) {
  var text = q['引用テキスト'] || q.text || '';
  var attr = q['顧客属性'] || q.customerProfile || '';
  return '<div class="quote-card">' +
    '<span class="quote-sent">' + sentIcon + '</span>' +
    '<div class="quote-body">' +
      '<div class="quote-text">"' + esc(text) + '"</div>' +
      (attr ? '<div class="quote-attr">— ' + esc(attr) + '</div>' : '') +
    '</div>' +
  '</div>';
}

function renderEvidence(evidence) {
  if (!evidence || !evidence.length) return '';
  var id = 'ev' + Math.random().toString(36).slice(2, 8);
  return '<div class="ev-toggle" onclick="toggleEv(\'' + id + '\', this)">📎 根拠 ' + evidence.length + '件 <span>▾</span></div>' +
  '<div id="' + id + '" class="ev-list" style="display:none">' +
  evidence.map(function(ev) {
    return '<div class="ev-item">' +
      '<div class="ev-quote">"' + esc(ev.quote || '') + '"</div>' +
      (ev.sourceUrl ? '<div class="ev-src"><a href="' + esc(ev.sourceUrl) + '" target="_blank" rel="noopener">' + esc(ev.sourceTitle || ev.sourceUrl) + '</a></div>' : '') +
    '</div>';
  }).join('') + '</div>';
}

function confBadge(c) {
  if (!c) return '';
  var cls = c === '高' ? 'b-green' : c === '中' ? 'b-amber' : 'b-gray';
  return '<span class="badge ' + cls + '">確信度:' + esc(c) + '</span>';
}

function evBadge(e) {
  if (!e) return '';
  var cls = e === '事実' ? 'b-green' : e === '推定' ? 'b-amber' : 'b-gray';
  return '<span class="badge ' + cls + '">' + esc(e) + '</span>';
}

function trunc(s, n) {
  if (!s) return '';
  s = String(s);
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function toggleEv(id, btn) {
  var el = document.getElementById(id);
  var sp = btn.querySelector('span');
  if (el.style.display === 'none') { el.style.display = 'flex'; if (sp) sp.textContent = '▴'; }
  else { el.style.display = 'none'; if (sp) sp.textContent = '▾'; }
}

function showMsg(type, msg) {
  setMainHtml('<div class="center"><div class="c-desc">' + (type === 'error' ? '読み込みエラー: ' : '') + esc(msg || '') + '</div></div>');
}

function showEmpty() {
  setMainHtml('<div class="center"><div class="c-desc">Claudeから「〇〇について事業調査して」と依頼してください。</div></div>');
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
